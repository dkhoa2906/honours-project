<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BCG Rhythm Game</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div id="bg-effects" aria-hidden="true">
        <div class="orb orb-a"></div>
        <div class="orb orb-b"></div>
        <div class="grid"></div>
    </div>

    <!-- HEADER -->
    <div id="header">
        <div id="brand">
            <img id="brand-logo" src="./logo.svg" alt="BCG logo">
            <div id="brand-text">
                <h1>BCG Rhythm</h1>
                <p>Brain Calibration Game</p>
            </div>
        </div>
        <span id="phase-badge">IDLE</span>
    </div>

    <!-- GAME -->
    <div id="game-wrap">

        <canvas id="game" width="320" height="520"></canvas>
        <div id="overlay-calibrating">
            <div>CALIBRATING</div>
        </div>
        <div id="lane-labels">
            <div class="lane-labels LEFT">Left</div>
            <div class="lane-labels RIGHT">Right</div>
        </div>

    </div>

    <!-- INFO PANEL -->
    <div id="info-panel">
        <div class="info-row">
            <span class="info-key">PHASE</span>
            <span id="info-phase">—</span>
        </div>
        <div class="info-row">
            <span class="info-key">TRIAL</span>
            <span id="info-trial">—</span>
        </div>
        <div class="info-row">
            <span class="info-key">COUNT</span>
            <span id="info-count">0</span>
        </div>
        <div class="info-row" id="row-predict" style="display:none">
            <span class="info-key">PREDICT</span>
            <span id="info-predict">—</span>
        </div>
        <div class="info-row">
            <span class="info-key">EEG</span>
            <span id="info-eeg">—</span>
        </div>
    </div>

    <!-- FOOTER -->
    <div id="footer">
        <button id="btn-connect">Connect</button>
        <button id="btn-start">Start</button>
    </div>

    <!-- SCRIPTS -->
    <script src="js/config.js"></script>
    <script src="js/renderer.js"></script>
    <script src="js/audio.js"></script>
    <script src="js/game.js"></script>
    <script src="js/websocket.js"></script>
</body>

</html>
